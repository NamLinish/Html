<!DOCTYPE html>
<html>
<head>

    <style>
        body {

            margin: 0;
        }

        header {

            text-align: center;
            padding: 15px;
        }

        nav {
            background-color: gray;
            padding: 10px;
        }

        nav a {
            margin: 10px;
            color: white;
            text-decoration: none;
        }

        .container {
            display: flex;
        }

        .content {
            width: 70%;
            padding: 20px;
        }

        .sidebar {

            background-color: lightgray;
            padding: 20px;
        }

        footer {
            background-color: black;
            color: white;
            text-align: center;
            padding: 10px;
        }

</head>

<body>

<header>
    <h1>My Blog</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Posts</a>
    <a href="#">Contact</a>
</nav>

<div class="container">
    <div class="content">
        <h2>Blog Post Title</h2>
        <p>This is a sample blog post content.</p>
    </div>

    <div class="sidebar">
        <h3>About Me</h3>
        <p>Student & Developer</p>
    </div>
</div>

<footer>
    <p>© 2026 My Blog</p>
</footer>

</body>
</html>
